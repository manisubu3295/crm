<svg width="1440" height="860" viewBox="0 0 1440 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Aadhirai engineering project lab illustration</title>
  <desc id="desc">An abstract engineering lab scene with project board, publication graph, and placement growth indicators.</desc>
  <defs>
    <linearGradient id="bg" x1="180" y1="90" x2="1250" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ECF5FF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="lineBlue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0071E3"/>
      <stop offset="1" stop-color="#58AEFF"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1440" height="860" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#2B4A6A" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect x="28" y="24" width="1384" height="812" rx="44" fill="url(#bg)"/>

  <g opacity="0.55">
    <circle cx="1248" cy="156" r="118" fill="#DCEEFF"/>
    <circle cx="220" cy="702" r="136" fill="#EAF4FF"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="110" y="120" width="620" height="620" rx="36" fill="white"/>
    <rect x="110" y="120" width="620" height="620" rx="36" stroke="#DCE2EA"/>

    <rect x="158" y="190" width="256" height="150" rx="20" fill="#F4F8FE" stroke="#DCE6F2"/>
    <text x="186" y="232" fill="#6E6E73" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="600">Project Build</text>
    <rect x="188" y="258" width="188" height="12" rx="6" fill="#CFE4FB"/>
    <rect x="188" y="282" width="152" height="12" rx="6" fill="#DDEBFA"/>
    <rect x="188" y="306" width="134" height="12" rx="6" fill="#E9F2FC"/>

    <rect x="432" y="190" width="250" height="150" rx="20" fill="#F6FAFF" stroke="#DCE6F2"/>
    <text x="460" y="232" fill="#6E6E73" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="600">Scopus Track</text>
    <path d="M464 300L512 268L548 282L592 242L646 210" stroke="url(#lineBlue)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="646" cy="210" r="7" fill="#0071E3"/>

    <rect x="158" y="374" width="524" height="320" rx="24" fill="#FAFCFF" stroke="#DCE6F2"/>
    <text x="186" y="424" fill="#3B4A5D" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="700">2,400+ students launched</text>
    <rect x="186" y="454" width="452" height="2" fill="#E3ECF7"/>

    <rect x="186" y="484" width="96" height="172" rx="14" fill="#D8EBFF"/>
    <rect x="300" y="456" width="96" height="200" rx="14" fill="#BFE0FF"/>
    <rect x="414" y="426" width="96" height="230" rx="14" fill="#8FC6FF"/>
    <rect x="528" y="386" width="96" height="270" rx="14" fill="#5CAEFF"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="780" y="170" width="540" height="250" rx="30" fill="white" stroke="#DCE2EA"/>
    <text x="826" y="236" fill="#1D1D1F" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="700">Real labs, real outcomes</text>
    <text x="826" y="286" fill="#6E6E73" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24">Final-year projects, publication support, and placements</text>

    <g transform="translate(826 326)">
      <rect width="116" height="44" rx="22" fill="#0071E3"/>
      <text x="58" y="29" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="600">Projects</text>
      <rect x="130" width="142" height="44" rx="22" fill="#EEF5FF"/>
      <text x="201" y="29" text-anchor="middle" fill="#2A5D95" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="600">Publications</text>
      <rect x="286" width="122" height="44" rx="22" fill="#EEF5FF"/>
      <text x="347" y="29" text-anchor="middle" fill="#2A5D95" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="600">Placements</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="460" width="500" height="210" rx="30" fill="white" stroke="#DCE2EA"/>
    <text x="864" y="528" fill="#1D1D1F" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="700">94% placement rate</text>
    <text x="864" y="572" fill="#6E6E73" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24">within 90 days after graduation</text>
    <path d="M864 618H1268" stroke="#E2E8F1" stroke-width="2"/>
    <circle cx="1268" cy="618" r="9" fill="#0071E3"/>
  </g>
</svg>
